services:

  server:
    command: npm run dev:docker -w server
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules

  client:
    command: npm run dev -w client
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
    
volumes:
  server_node_modules:
  client_node_modules:
  