services:

  server:
    command: sh -c "npm run build -w shared && npm run dev:docker -w server"
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules

  client:
    working_dir: /app
    command: sh -c "npm run build -w shared && npm run dev -w client"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
    
volumes:
  server_node_modules:
  client_node_modules:
  