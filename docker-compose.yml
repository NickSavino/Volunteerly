services:

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    container_name: volunteerly-server
    environment:
      PORT: ${SERVER_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    ports:
     - "4000:4000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    container_name: volunteerly-web
    environment:
      PORT: ${CLIENT_PORT}
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    
volumes:
  node_modules: