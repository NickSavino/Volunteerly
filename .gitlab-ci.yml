image: node:20

workflow:
  rules:
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "development"

stages:
  - deploy
  - install
  - typecheck
  - build

cache:
  paths:
    - node_modules/

deploy:
  stage: deploy
  script:
    - npm install -g vercel
    - cd client
    - vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
    - vercel build --prod --token="$VERCEL_TOKEN"
    - vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"  

install:
  stage: install
  script:
    - npm ci

typecheck:
  stage: typecheck
  script:
    - npm run typecheck
  needs: ["install"]

build:
  stage: build
  script:
    - npm run build
  needs: ["typecheck"]


