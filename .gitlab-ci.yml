
workflow:
  rules:
  - if: $CI_MERGE_REQUEST_ID
  - if: $CI_COMMIT_BRANCH == "main"
  - if: $CI_COMMIT_BRANCH == "development"

stages:
  - install
  - typecheck
  - build

cache:
  paths:
    - node_modules/
  
install:
  stage: install
  script:
    - npm ci

typecheck:
  stage: typecheck
  script:
    - npm run typecheck
  needs: ["install"]

build:
  stage: build
  image: node:20
  script:
    - npm run build
  needs: ["install"]